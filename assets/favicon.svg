<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#2E7D12"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#81C784"/>
    </linearGradient>
  </defs>
 
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>
 
  <!-- Candlestick bars -->
  <!-- Bar 1 (left, blue) -->
  <rect x="4" y="18" width="4" height="9" rx="1" fill="#5B9BD5"/>
  <rect x="5.5" y="15" width="1" height="3" rx="0.5" fill="#5B9BD5"/>
  <rect x="5.5" y="27" width="1" height="2" rx="0.5" fill="#5B9BD5"/>
 
  <!-- Bar 2 (middle-left, green) -->
  <rect x="10" y="13" width="4" height="11" rx="1" fill="#66BB6A"/>
  <rect x="11.5" y="10" width="1" height="3" rx="0.5" fill="#66BB6A"/>
  <rect x="11.5" y="24" width="1" height="2" rx="0.5" fill="#66BB6A"/>
 
  <!-- Bar 3 (middle-right, green tall) -->
  <rect x="16" y="10" width="4" height="14" rx="1" fill="#81C784"/>
  <rect x="17.5" y="7" width="1" height="3" rx="0.5" fill="#81C784"/>
  <rect x="17.5" y="24" width="1" height="2" rx="0.5" fill="#81C784"/>
 
  <!-- Arrow pointing up-right -->
  <polyline points="9,20 14,14 19,17 26,7" 
    stroke="#A5D6A7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrowhead -->
  <polygon points="26,7 21,7 26,12" fill="#A5D6A7"/>
</svg>